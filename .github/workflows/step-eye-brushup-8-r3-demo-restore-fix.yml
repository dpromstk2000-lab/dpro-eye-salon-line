name: STEP EYE-BRUSHUP-8 R3 Demo Restore Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-8-r3-demo-restore-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-8-r3-demo-restore-fix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Apply demo restore fix
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import re

          release_path = Path("release-check.html")
          system_path = Path("system-check.html")
          config_path = Path("config.js")

          for path in [release_path,system_path,config_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          release_text = release_path.read_text(encoding="utf-8")

          old_restore = '      async function restore() {\n        if (!confirm(\n          "デモ顧客・予約・カルテを標準状態へ復元しますか？"\n        )) return;\n        $("#restoreButton").disabled = true;\n        $("#overallStatus").className = "status warn";\n        $("#overallStatus").textContent = "デモ環境を復元しています…";\n        try {\n          await fetchJson(config.API.admin_demo_restore,{\n            method:"POST",headers:headers(),\n          });\n          toast("デモ環境を標準状態へ復元しました。");\n          await run();\n        } catch (error) {\n          $("#overallStatus").className = "status ng";\n          $("#overallStatus").textContent = error.message;\n          setDecision(false,[error.message]);\n          toast(error.message,true);\n        } finally {\n          $("#restoreButton").disabled = false;\n        }\n      }\n'
          new_restore = '      async function restore() {\n        if (!confirm(\n          "デモ顧客・予約・カルテの標準データを再準備しますか？"\n        )) return;\n\n        const previousDecision =\n          $("#releaseDecisionTitle").textContent || "判定済み";\n\n        $("#restoreButton").disabled = true;\n        $("#restoreButton").textContent = "再準備しています…";\n        $("#overallStatus").className = "status warn";\n        $("#overallStatus").textContent =\n          "デモ標準データを安全に再準備しています…";\n\n        try {\n          const result = await requestWithRetry(\n            "デモ標準データ準備",\n            config.API.admin_demo_prepare,\n            {\n              method:"POST",\n              headers:headers(),\n            }\n          );\n\n          if (!result.ok) {\n            throw new Error(result.error);\n          }\n\n          toast("デモ標準データを再準備しました。");\n          await run();\n        } catch (error) {\n          const message =\n            `デモ標準データの再準備だけが失敗しました：${error.message}`;\n\n          $("#overallStatus").className = "status warn";\n          $("#overallStatus").textContent =\n            `${message} 営業判定は「${previousDecision}」のままです。`;\n\n          toast(message,true);\n          $("#rawResult").textContent = safeStringify({\n            operation:"demo_prepare",\n            ok:false,\n            message,\n            release_decision_preserved:previousDecision,\n          });\n        } finally {\n          $("#restoreButton").disabled = false;\n          $("#restoreButton").textContent =\n            "デモ標準データを再準備";\n        }\n      }\n'

          if old_restore not in release_text:
              raise SystemExit(
                  "release-check.htmlの復元処理が想定と異なるため、"
                  "安全のため停止しました。"
              )

          release_text = release_text.replace(old_restore,new_restore,1)

          old_button = """          デモ環境を標準状態へ復元
          """
          new_button = """          デモ標準データを再準備
          """

          if old_button not in release_text:
              raise SystemExit("復元ボタンの表示文言が見つかりません。")

          release_text = release_text.replace(old_button,new_button,1)
          release_text = release_text.replace(
              "EYE-18-R2-RELEASE-CHECK-RETRY-20260723",
              "EYE-18-R3-DEMO-RESTORE-FIX-20260723"
          )

          if "config.API.admin_demo_restore" in release_text:
              raise SystemExit(
                  "release-check.htmlに旧demo-restore呼出しが残っています。"
              )
          if "config.API.admin_demo_prepare" not in release_text:
              raise SystemExit(
                  "release-check.htmlにdemo-prepare呼出しがありません。"
              )
          if "setDecision(false,[error.message])" in release_text:
              raise SystemExit(
                  "復元失敗で営業判定を上書きする旧処理が残っています。"
              )

          release_path.write_text(release_text,encoding="utf-8")

          system_text = system_path.read_text(encoding="utf-8")
          system_text = system_text.replace(
              "EYE-18-R2-RELEASE-CHECK-RETRY-20260723",
              "EYE-18-R3-DEMO-RESTORE-FIX-20260723"
          )
          if "EYE-18-R3-DEMO-RESTORE-FIX-20260723" not in system_text:
              raise SystemExit(
                  "system-check.htmlのバージョン更新に失敗しました。"
              )
          system_path.write_text(system_text,encoding="utf-8")

          config_text = config_path.read_text(encoding="utf-8")
          config_text, count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-18-R3-DEMO-RESTORE-FIX-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのバージョン更新に失敗しました。")
          config_path.write_text(config_text,encoding="utf-8")
          PY

      - name: Validate demo restore fix
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'EYE-18-R3-DEMO-RESTORE-FIX-20260723' config.js
          grep -q 'EYE-18-R3-DEMO-RESTORE-FIX-20260723' system-check.html
          grep -q 'EYE-18-R3-DEMO-RESTORE-FIX-20260723' release-check.html

          grep -q 'config.API.admin_demo_prepare' release-check.html
          grep -q 'デモ標準データを再準備' release-check.html
          grep -q 'release_decision_preserved' release-check.html
          grep -q 'requestWithRetry' release-check.html

          ! grep -q 'config.API.admin_demo_restore' release-check.html
          ! grep -q 'MutationObserver' release-check.html
          ! grep -q 'owner-brushup.js' release-check.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          for page in ["system-check.html","release-check.html"]:
              text = Path(page).read_text(encoding="utf-8")

              parser = HTMLParser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if not inline:
                  raise SystemExit(
                      f"{page}: インラインJavaScriptがありません。"
                  )

              js_path = Path("/tmp") / f"{Path(page).stem}-r3-inline.js"
              js_path.write_text(
                  "\n".join(inline),
                  encoding="utf-8",
              )
              subprocess.run(
                  ["node","--check",str(js_path)],
                  check=True,
              )
              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(
              ["node","--check","config.js"],
              check=True,
          )
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-8-r3-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-8-r3-demo-restore-fix.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-8 R3"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-8 R3 fix demo restore"
          git push origin HEAD:main
