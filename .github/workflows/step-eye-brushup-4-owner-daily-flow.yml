                    );
                    container.append(card);
                  }
                }

                function setNewCustomerMode() {'''
              replace_regex(
                  booking_customer_pattern,
                  booking_customer_replacement,
                  "予約顧客直接選択"
              )

              load_detail_pattern = (
                  r'      async function loadCustomerDetail\(id,card\) \{.*?'
                  r'\n      \}\n\n      function renderCustomerDetail\(data\) \{'
              )
              load_detail_replacement = '''      async function loadCustomerDetail(id,card,options={}) {
                  if (!options.preserveReservation) {
                    state.carteReservationId = "";
                    state.carteReservationRow = null;
                    $("#carteReservationGuide").hidden = true;
                  }
                  $("#customerResults").querySelectorAll(".customer-card").forEach(node =>
                    node.classList.remove("selected")
                  );
                  if (card) card.classList.add("selected");
                  $("#customerDetailPanel").hidden = false;
                  $("#customerDetailSubtitle").textContent = "顧客情報を読み込んでいます…";
                  const url = new URL(config.API.admin_customer_detail);
                  url.searchParams.set("customer_id",id);
                  try {
                    const data = await fetchJson(url,{headers:adminHeaders()});
                    state.customerDetail = data;
