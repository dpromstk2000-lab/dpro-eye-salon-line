                    $("#customerDetailSubtitle").textContent = error.message;
                    toast(error.message,true);
                  }
                }

                function meaningfulAttention(value) {
                  const text = normalizeDailyText(value);
                  if (!text || text === "―") return false;
                  return ![
                    "なし","ありません","未設定","該当なし","いいえ","未使用"
                  ].some(word => text === normalizeDailyText(word));
                }

                function renderOwnerAttention(data) {
                  const box = $("#ownerDailyAttention");
                  const customer = data.customer || {};
                  const intake = data.intake?.[0] || {};
                  const items = [];

                  if (meaningfulAttention(customer.contact_lens)) {
                    items.push(`コンタクト：${customer.contact_lens}`);
                  }
                  if (customer.sensitive_skin || intake.sensitive_skin) {
                    items.push("敏感肌：あり");
                  }
                  const allergy =
                    customer.allergy_summary ||
                    customer.medical_caution ||
                    intake.allergy_note ||
                    "";
                  if (meaningfulAttention(allergy)) {
                    items.push(`アレルギー・注意事項：${allergy}`);
                  }
                  if (meaningfulAttention(intake.eye_condition_note)) {
                    items.push(`目元状態：${intake.eye_condition_note}`);
                  }

                  box.replaceChildren();
                  const title = document.createElement("strong");
                  if (!items.length) {
                    box.className = "owner-attention";
                    title.textContent =
                      "施術上の重要な注意事項は登録されていません";
                    box.append(title);
                    return;
                  }
                  box.className = "owner-attention alert";
                  title.textContent = "施術前に必ず確認してください";
                  const list = document.createElement("ul");
                  for (const item of items) {
                    const row = document.createElement("li");
                    row.textContent = item;
                    list.append(row);
                  }
                  box.append(title,list);
                }

                function renderCustomerDetail(data) {'''
              replace_regex(
                  load_detail_pattern,
                  load_detail_replacement,
                  "顧客直接表示と注意事項"
              )

              render_detail_pattern = (
                  r'      function renderCustomerDetail\(data\) \{.*?'
                  r'\n      \}\n\n      function renderCustomerHistory\(rows\) \{'
              )
              render_detail_replacement = '''      function renderCustomerDetail(data) {
                  const c = data.customer;
                  $("#detailName").textContent = c.full_name || "―";
                  $("#detailPhone").textContent = c.phone || "";
                  $("#detailCustomerNo").textContent = c.customer_no || "―";
                  $("#detailVisits").textContent = `${c.total_visits || 0}回`;
                  $("#detailNextVisit").textContent = c.next_revisit_date || "未設定";
                  $("#detailLine").textContent = c.line_user_id ? "連携済み" : "未連携";
                  $("#detailLastVisit").textContent = c.last_visit_at || "未登録";
                  $("#detailContactLens").textContent = c.contact_lens || "未設定";
                  $("#detailSensitive").textContent = c.sensitive_skin ? "あり" : "なし";
                  $("#detailAllergy").textContent =
                    c.allergy_summary || c.medical_caution || "なし";
                  $("#customerDetailSubtitle").textContent =
                    `${c.customer_no} ／ ${c.normalized_phone || ""}`;

                  const intake = data.intake?.[0];
                  $("#latestIntake").textContent = intake
                    ? `最新事前確認：コンタクト ${intake.contact_lens || "不明"} ／ ` +
                      `敏感肌 ${intake.sensitive_skin ? "あり" : "なし"} ／ ` +
                      `${intake.allergy_note || intake.eye_condition_note || "特記事項なし"}`
                    : "事前確認情報はありません。";

                  renderOwnerAttention(data);
                  renderCustomerHistory(data.reservations || []);
                  renderCartes(data.cartes || []);
                  $("#carteDate").value =
                    state.carteReservationRow?.jst?.start?.date || jstToday();
                  $("#carteNextVisit").value =
                    state.carteReservationRow
                      ? suggestedNextVisit(state.carteReservationRow) ||
                        c.next_revisit_date ||
                        ""
                      : c.next_revisit_date || "";
                  $("#carteReservationGuide").hidden =
                    !state.carteReservationId;
                  applyCarteFieldVisibility();
                }

                function renderCustomerHistory(rows) {'''
              replace_regex(
                  render_detail_pattern,
                  render_detail_replacement,
                  "顧客詳細表示"
              )

              clear_pattern = (
                  r'      function clearCarteForm\(\) \{.*?'
                  r'\n      \}\n\n      async function saveCarte\(\) \{'
              )
              clear_replacement = '''      function clearCarteForm() {
                  [
                    "carteRod","carteCurl","carteLength","carteThickness",
                    "carteCount","carteDesign","carteDifference","carteChemical",
                    "carteProcessing","carteBrowShape","carteWaxSkin","carteFinish",
                    "carteHomecare","carteNextImprovement","cartePrivateNote",
                  ].forEach(id => $(`#${id}`).value = "");
                  $("#carteTreatmentType").value =
                    state.carteReservationRow
                      ? inferCarteTreatment(state.carteReservationRow)
                      : "lash_lift";
                  $("#carteDate").value =
                    state.carteReservationRow?.jst?.start?.date || jstToday();
                  $("#carteNextVisit").value =
                    state.carteReservationRow
                      ? suggestedNextVisit(state.carteReservationRow) ||
                        state.customerDetail?.customer?.next_revisit_date ||
                        ""
                      : state.customerDetail?.customer?.next_revisit_date || "";

                  const staff = state.staff.find(member =>
                    member.display_name === state.carteReservationRow?.staff_name
                  );
                  if (staff) $("#carteStaff").value = staff.id;
                  $("#carteReservationGuide").hidden =
                    !state.carteReservationId;
                  applyCarteFieldVisibility();
                }

                async function saveCarte() {'''
              replace_regex(
                  clear_pattern,
                  clear_replacement,
                  "カルテ予約情報準備"
              )

              payload_anchor = '''          customer_id:detail.customer.id,
                    staff_id:$("#carteStaff").value,
          '''
              payload_insert = '''          customer_id:detail.customer.id,
                    reservation_id:state.carteReservationId || undefined,
                    staff_id:$("#carteStaff").value,
          '''
              replace_once(payload_anchor, payload_insert, "カルテ予約ID保存")

              save_success_anchor = '''          toast("カルテを保存しました。");
                    clearCarteForm();
                    await loadCustomerDetail(detail.customer.id);
          '''
              save_success_insert = '''          toast(
                      state.carteReservationId
                        ? "今回の予約に紐づくカルテを保存しました。"
                        : "カルテを保存しました。"
                    );
                    state.carteReservationId = "";
                    state.carteReservationRow = null;
                    $("#carteReservationGuide").hidden = true;
                    clearCarteForm();
                    await loadCustomerDetail(detail.customer.id);
          '''
              replace_once(
                  save_success_anchor,
                  save_success_insert,
                  "カルテ保存後リセット"
              )

              event_anchor = '''      $("#carteSaveButton").addEventListener("click",saveCarte);
                $("#carteClearButton").addEventListener("click",clearCarteForm);

                $("#followupReload").addEventListener("click",loadFollowups);
          '''
              event_insert = '''      $("#carteSaveButton").addEventListener("click",saveCarte);
                $("#carteClearButton").addEventListener("click",clearCarteForm);
                $("#carteTreatmentType").addEventListener(
                  "change",
                  applyCarteFieldVisibility
                );
                $("#customerNewCarteButton").addEventListener("click",() => {
                  state.carteReservationId = "";
                  state.carteReservationRow = null;
                  $("#carteReservationGuide").hidden = true;
                  clearCarteForm();
                  switchCustomerTab("new-carte");
                });
                $("#customerPreviousCarteButton").addEventListener("click",() =>
                  switchCustomerTab("cartes")
                );
                $("#customerNextBookingButton").addEventListener(
                  "click",
                  prepareNextBookingForCurrentCustomer
                );
                $("#completeNoNextVisit").addEventListener("change",event => {
                  $("#completeNextVisit").disabled = event.target.checked;
                  if (event.target.checked) {
                    $("#completeNextVisit").value = "";
                    $("#completeGuide").textContent =
                      "次回来店日は登録せず、施術完了だけを保存します。";
                  } else {
                    showCompletionFields(state.selectedReservation);
                  }
                });
                $("#completeSaveButton").addEventListener("click",() =>
                  updateReservationStatus("completed")
                );

                $("#followupReload").addEventListener("click",loadFollowups);
          '''
              replace_once(event_anchor, event_insert, "日常操作イベント")

              if "owner-brushup.js" in text:
                  raise SystemExit(
                      "owner.html内に旧追加スクリプト参照が見つかったため停止しました。"
                  )

              owner_path.write_text(text, encoding="utf-8")

          config_text = config_path.read_text(encoding="utf-8")
          if "owner-brushup.js" in config_text:
              raise SystemExit(
                  "config.jsに旧owner-brushup.js読込が残っています。"
                  "先にロールバックを完了してください。"
              )

          config_text, version_count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-14-OWNER-DAILY-FLOW-20260722"',
              config_text,
              count=1,
          )
          if version_count != 1:
              raise SystemExit("config.js のVERSIONを更新できませんでした。")
          config_path.write_text(config_text, encoding="utf-8")
          PY

      - name: Validate owner daily flow
        shell: bash
        run: |
          set -euo pipefail

          test -f owner.html
          test -f config.js

          grep -q 'id="ownerDailyAttention"' owner.html
          grep -q '次の操作：' owner.html
          grep -q 'id="completeNoNextVisit"' owner.html
          grep -q 'reservation_id:state.carteReservationId || undefined' owner.html
          grep -q 'prepareNextBookingFromReservation' owner.html
          grep -q 'applyCarteFieldVisibility' owner.html
          grep -q 'EYE-14-OWNER-DAILY-FLOW-20260722' config.js

          ! grep -q 'owner-brushup.js' config.js
          ! grep -q 'MutationObserver' owner.html

          python3 <<'PY'
          from pathlib import Path
          import re

          html = Path("owner.html").read_text(encoding="utf-8")
          scripts = re.findall(
              r"<script(?:\s[^>]*)?>(.*?)</script>",
              html,
              flags=re.S,
          )
          inline = [script for script in scripts if script.strip()]
          if not inline:
              raise SystemExit(
                  "検査対象のインラインJavaScriptがありません。"
              )
          Path("/tmp/owner-inline.js").write_text(
              "\n".join(inline),
              encoding="utf-8",
          )
          PY

          node --check /tmp/owner-inline.js
          node --check config.js

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          parser = Parser()
          parser.feed(Path("owner.html").read_text(encoding="utf-8"))
          parser.close()
          print("HTML parser check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-4-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-4-owner-daily-flow.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-4"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-4 simplify owner daily flow"
          git push origin HEAD:main
