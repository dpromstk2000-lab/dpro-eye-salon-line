name: STEP EYE-BRUSHUP-8 Integrated Release Check

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-8-integrated-release-check.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-8-integrated-release-check
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install integrated release check
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          files = {
              "system-check.html": "",
              "release-check.html": "",
          }

          for path, encoded in files.items():
              Path(path).write_bytes(base64.b64decode(encoded))

          config_path = Path("config.js")
          if not config_path.exists():
              raise SystemExit("config.js が見つかりません。")

          config_text = config_path.read_text(encoding="utf-8")
          if "owner-brushup.js" in config_text:
              raise SystemExit("config.jsに旧追加スクリプト読込が残っています。")

          config_text, count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-18-INTEGRATED-RELEASE-CHECK-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.js のVERSIONを更新できませんでした。")

          config_path.write_text(config_text, encoding="utf-8")
          PY

      - name: Validate required feature markers
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path

          rules = {
              "index.html": [
                  'id="returningPanel"',
                  'id="existingBookingWarning"',
                  'function applyRepeatReservation(',
                  'function validateExistingBooking(',
                  'X-Idempotency-Key',
                  '$("#bookingDate").min = today',
                  'function validateCustomer(',
              ],
              "member.html": [
                  'id="memberShortcutPanel"',
                  'id="memberRepeatLatest"',
                  'function repeatBookingUrl(',
                  'キャンセルを申請',
              ],
              "owner.html": [
                  'id="ownerDailyAttention"',
                  'id="completeNoNextVisit"',
                  'id="followupSummary"',
                  'function nextDailyAction(',
                  'function prepareNextBookingFromReservation(',
                  'function validFutureReservation(',
                  'function recommendedFollowupMessage(',
                  'reservation_id:state.carteReservationId || undefined',
              ],
              "owner-ipad.html": [
                  'id="carteModePanel"',
                  'id="copyPreviousCarte"',
                  'id="editCurrentCarte"',
                  '前回カルテは上書きせず',
              ],
              "settings.html": [
                  'id="settingsModeBar"',
                  'id="settingsChecklist"',
                  'id="settingsValidation"',
                  'function settingsIssues(',
                  'function confirmSettingsSave(',
                  'beforeunload',
              ],
              "migration.html": [
                  '既存システム移行',
              ],
              "system-check.html": [
                  'id="integratedGate"',
                  '営業開始不可',
                  'function featureChecks(',
                  'function runAll(',
              ],
              "release-check.html": [
                  'id="releaseDecision"',
                  'id="featureChecks"',
                  '営業開始不可',
                  'function checkFeatures(',
                  'function run(',
              ],
          }

          blocked = [
              "MutationObserver",
              "owner-brushup.js",
          ]

          failures = []
          for path, markers in rules.items():
              file = Path(path)
              if not file.exists():
                  failures.append(f"{path}: ファイルなし")
                  continue
              text = file.read_text(encoding="utf-8")
              for marker in markers:
                  if marker not in text:
                      failures.append(f"{path}: 必須マーカーなし: {marker}")
              for token in blocked:
                  if token in text:
                      failures.append(f"{path}: 禁止コード検出: {token}")

          config = Path("config.js").read_text(encoding="utf-8")
          if "EYE-18-INTEGRATED-RELEASE-CHECK-20260723" not in config:
              failures.append("config.js: STEP 8バージョンなし")
          if "owner-brushup.js" in config:
              failures.append("config.js: 旧追加スクリプト参照あり")

          if failures:
              raise SystemExit("\n".join(failures))

          print("Required feature marker validation passed.")
          PY

      - name: Validate all HTML and JavaScript
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          pages = [
              "index.html",
              "member.html",
              "owner.html",
              "owner-ipad.html",
              "settings.html",
              "migration.html",
              "system-check.html",
              "release-check.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")

              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-inline.js"
                  js_path.write_text("\n".join(inline), encoding="utf-8")
                  subprocess.run(
                      ["node", "--check", str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node", "--check", "config.js"], check=True)
          print("config.js check passed.")
          PY

      - name: Validate integrated check structure
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'id="integratedGate"' system-check.html
          grep -q 'id="releaseDecision"' release-check.html
          grep -q 'id="featureChecks"' release-check.html
          grep -q 'config.API.admin_system_check' system-check.html
          grep -q 'config.API.admin_release_check' system-check.html
          grep -q 'config.API.admin_system_check' release-check.html
          grep -q 'config.API.admin_release_check' release-check.html
          grep -q 'EYE-18-INTEGRATED-RELEASE-CHECK-20260723' config.js

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-8-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-8-integrated-release-check.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-8"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-8 add integrated release gate"
          git push origin HEAD:main
