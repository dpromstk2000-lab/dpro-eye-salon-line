name: STEP EYE-BRUSHUP-11 Production Clone Template

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-11-production-clone-template.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-11-production-clone-template
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Add production clone template
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          production_path = Path("production-clone.html")
          config_path = Path("config.js")
          delivery_path = Path("delivery.html")
          release_path = Path("release-check.html")
          system_path = Path("system-check.html")

          for path in [config_path,delivery_path,release_path,system_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          production_path.write_bytes(base64.b64decode(''))

          config_text = config_path.read_text(encoding="utf-8")
          delivery_text = delivery_path.read_text(encoding="utf-8")
          release_text = release_path.read_text(encoding="utf-8")
          system_text = system_path.read_text(encoding="utf-8")

          config_text,count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのVERSION更新に失敗しました。")

          page_anchor = '      delivery: `${pageBase}delivery.html`,\n'
          page_insert = (
              '      delivery: `${pageBase}delivery.html`,\n'
              '      production_clone: `${pageBase}production-clone.html`,\n'
          )
          if 'production_clone: `${pageBase}production-clone.html`' not in config_text:
              if config_text.count(page_anchor) != 1:
                  raise SystemExit("config.jsの追加位置が見つかりません。")
              config_text = config_text.replace(page_anchor,page_insert,1)

          delivery_text = delivery_text.replace(
              "EYE-19-DELIVERY-WORKFLOW-20260723",
              "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723"
          )

          top_anchor = '          <a href="./release-check.html">DPRO内部最終検査</a>\n'
          top_insert = (
              '          <a href="./production-clone.html">本番店舗複製</a>\n'
              '          <a href="./release-check.html">DPRO内部最終検査</a>\n'
          )
          if 'href="./production-clone.html">本番店舗複製</a>' not in delivery_text:
              if delivery_text.count(top_anchor) != 1:
                  raise SystemExit("delivery.html上部リンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(top_anchor,top_insert,1)

          quick_anchor = '        <a class="quick-link" href="./migration.html"><strong>既存システム移行</strong><span>顧客CSV・将来予約・LINE再連携</span></a>\n'
          quick_insert = (
              '        <a class="quick-link" href="./migration.html"><strong>既存システム移行</strong><span>顧客CSV・将来予約・LINE再連携</span></a>\n'
              '        <a class="quick-link" href="./production-clone.html"><strong>本番店舗複製</strong><span>別環境・Secrets・切替ゲート</span></a>\n'
          )
          if '<strong>本番店舗複製</strong>' not in delivery_text:
              if delivery_text.count(quick_anchor) != 1:
                  raise SystemExit("delivery.htmlクイックリンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(quick_anchor,quick_insert,1)
              delivery_text = delivery_text.replace(
                  '.quick-links{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px}',
                  '.quick-links{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:9px}',
                  1,
              )

          task_anchor = '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          task_insert = (
              '            {id:"production_clone_plan",role:"assistant",title:"本番店舗複製・切替テンプレートを確定",detail:"デモ環境を直接本番化せず、店舗専用のSupabase・Worker・店舗コード・LINE設定を分離します。"},\n'
              '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          )
          if 'id:"production_clone_plan"' not in delivery_text:
              if delivery_text.count(task_anchor) != 1:
                  raise SystemExit("delivery.htmlタスクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(task_anchor,task_insert,1)

          for label,current in [("release",release_text),("system",system_text)]:
              current = current.replace(
                  "EYE-19-DELIVERY-WORKFLOW-20260723",
                  "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723"
              )
              page_anchor2 = '        {\n          key:"delivery",'
              if 'key:"production_clone"' not in current:
                  if current.count(page_anchor2) != 1:
                      raise SystemExit(f"{label} PAGE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      page_anchor2,
                      '        {\n          key:"production_clone",name:"本番店舗複製・切替",url:config.PAGES.production_clone,\n          markers:[\n            configScript(),attr("id","decisionBox"),\n            "dpro_eye_demo",\n            "PRODUCTION_SWITCH_PERMISSION",\n            fn("manifest"),\n          ],\n        },\n' + page_anchor2,
                      1,
                  )
              feature_anchor = '        {\n          key:"delivery_flow"'
              if 'key:"production_clone_guard"' not in current:
                  if current.count(feature_anchor) != 1:
                      raise SystemExit(f"{label} FEATURE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      feature_anchor,
                      '        {\n          key:"production_clone_guard",label:"デモ直本番化防止・店舗別環境分離",\n          requirements:[\n            ["production_clone",attr("id","decisionBox")],\n            ["production_clone","dpro_eye_demo"],\n            ["production_clone","PRODUCTION_SWITCH_PERMISSION"],\n            ["production_clone",fn("manifest")],\n          ],\n        },\n' + feature_anchor,
                      1,
                  )
              if label == "release":
                  release_text = current
              else:
                  system_text = current

          release_anchor = '          <a id="deliveryLink" href="./delivery.html">導入・納品進行</a>\n'
          release_insert = (
              '          <a id="deliveryLink" href="./delivery.html">導入・納品進行</a>\n'
              '          <a id="productionCloneLink" href="./production-clone.html">本番店舗複製</a>\n'
          )
          if 'id="productionCloneLink"' not in release_text:
              if release_text.count(release_anchor) != 1:
                  raise SystemExit("release-check.htmlリンク追加位置が見つかりません。")
              release_text = release_text.replace(release_anchor,release_insert,1)

          config_path.write_text(config_text,encoding="utf-8")
          delivery_path.write_text(delivery_text,encoding="utf-8")
          release_path.write_text(release_text,encoding="utf-8")
          system_path.write_text(system_text,encoding="utf-8")
          PY

      - name: Validate production clone template
        shell: bash
        run: |
          set -euo pipefail

          test -f production-clone.html
          test -f config.js
          test -f delivery.html
          test -f release-check.html
          test -f system-check.html

          grep -q 'EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723' config.js
          grep -q 'EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723' delivery.html
          grep -q 'EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723' release-check.html
          grep -q 'EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723' system-check.html

          grep -q 'production_clone: `${pageBase}production-clone.html`' config.js
          grep -q 'id="decisionBox"' production-clone.html
          grep -q 'dpro_eye_demo' production-clone.html
          grep -q 'PRODUCTION_SWITCH_PERMISSION' production-clone.html
          grep -q 'function manifest' production-clone.html
          grep -q 'secrets_in_manifest:false' production-clone.html
          grep -q 'SET_AS_CLOUDFLARE_SECRET_NOT_STORED' production-clone.html

          grep -q 'id:"production_clone_plan"' delivery.html
          grep -q 'href="./production-clone.html"' delivery.html
          grep -q 'key:"production_clone"' release-check.html
          grep -q 'key:"production_clone_guard"' release-check.html
          grep -q 'id="productionCloneLink"' release-check.html
          grep -q 'key:"production_clone"' system-check.html
          grep -q 'key:"production_clone_guard"' system-check.html

          ! grep -q 'MutationObserver' production-clone.html
          ! grep -q 'owner-brushup.js' production-clone.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          pages = [
              "production-clone.html",
              "delivery.html",
              "release-check.html",
              "system-check.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-step11-inline.js"
                  js_path.write_text(
                      "\n".join(inline),
                      encoding="utf-8",
                  )
                  subprocess.run(
                      ["node","--check",str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node","--check","config.js"],check=True)
          print("config.js check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-11-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-11-production-clone-template.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-11"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-11 add production clone template"
          git push origin HEAD:main
