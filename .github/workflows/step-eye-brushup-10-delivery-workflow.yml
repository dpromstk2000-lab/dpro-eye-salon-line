name: STEP EYE-BRUSHUP-10 Delivery Workflow

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-10-delivery-workflow.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-10-delivery-workflow
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Add internal delivery workflow
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          delivery_path = Path("delivery.html")
          config_path = Path("config.js")
          release_path = Path("release-check.html")
          system_path = Path("system-check.html")
          migration_path = Path("migration.html")

          for path in [config_path,release_path,system_path,migration_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          delivery_path.write_bytes(base64.b64decode(''))

          config_text = config_path.read_text(encoding="utf-8")
          release_text = release_path.read_text(encoding="utf-8")
          system_text = system_path.read_text(encoding="utf-8")
          migration_text = migration_path.read_text(encoding="utf-8")

          config_text, count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-19-DELIVERY-WORKFLOW-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのVERSION更新に失敗しました。")

          page_anchor = '      migration: `${pageBase}migration.html`,\n'
          page_insert = (
              '      migration: `${pageBase}migration.html`,\n'
              '      delivery: `${pageBase}delivery.html`,\n'
          )
          if 'delivery: `${pageBase}delivery.html`' not in config_text:
              if config_text.count(page_anchor) != 1:
                  raise SystemExit("config.jsのdelivery追加位置が見つかりません。")
              config_text = config_text.replace(page_anchor,page_insert,1)

          for label,current in [("release",release_text),("system",system_text)]:
              current = current.replace(
                  "EYE-18-R3-DEMO-RESTORE-FIX-20260723",
                  "EYE-19-DELIVERY-WORKFLOW-20260723"
              )

              page_rule_anchor = '        {\n          key:"migration",'
              if 'key:"delivery"' not in current:
                  if current.count(page_rule_anchor) != 1:
                      raise SystemExit(f"{label}のPAGE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      page_rule_anchor,
                      '        {\n          key:"delivery",name:"導入・納品進行",url:config.PAGES.delivery,\n          markers:[\n            configScript(),attr("id","deliveryWorkflow"),\n            "店舗オーナーへ技術作業を依頼せず",\n            "function runAutoChecks(",\n          ],\n        },\n' + page_rule_anchor,
                      1,
                  )

              feature_anchor = '        {\n          key:"settings_guard"'
              if 'key:"delivery_flow"' not in current:
                  if current.count(feature_anchor) != 1:
                      raise SystemExit(f"{label}のFEATURE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      feature_anchor,
                      '        {\n          key:"delivery_flow",label:"導入・乗り換え・納品の内部進行",\n          requirements:[\n            ["delivery",attr("id","deliveryWorkflow")],\n            ["delivery","店舗オーナーへ技術作業を依頼せず"],\n            ["delivery",fn("runAutoChecks")],\n          ],\n        },\n' + feature_anchor,
                      1,
                  )

              if label == "release":
                  release_text = current
              else:
                  system_text = current

          release_link_anchor = '          <a id="systemLink" href="./system-check.html">統合システムチェック</a>\n'
          release_link_insert = (
              '          <a id="systemLink" href="./system-check.html">統合システムチェック</a>\n'
              '          <a id="deliveryLink" href="./delivery.html">導入・納品進行</a>\n'
          )
          if 'id="deliveryLink"' not in release_text:
              if release_text.count(release_link_anchor) != 1:
                  raise SystemExit("release-check.htmlの導入リンク追加位置が見つかりません。")
              release_text = release_text.replace(release_link_anchor,release_link_insert,1)

          migration_link_anchor = '<a id="settingsLink" href="./settings.html">店舗設定</a><a id="releaseLink" href="./release-check.html">営業前最終検査</a>'
          migration_link_insert = '<a id="settingsLink" href="./settings.html">店舗設定</a><a id="deliveryLink" href="./delivery.html">導入・納品進行</a><a id="releaseLink" href="./release-check.html">営業前最終検査</a>'
          if 'id="deliveryLink"' not in migration_text:
              if migration_text.count(migration_link_anchor) != 1:
                  raise SystemExit("migration.htmlの導入リンク追加位置が見つかりません。")
              migration_text = migration_text.replace(migration_link_anchor,migration_link_insert,1)

          config_path.write_text(config_text,encoding="utf-8")
          release_path.write_text(release_text,encoding="utf-8")
          system_path.write_text(system_text,encoding="utf-8")
          migration_path.write_text(migration_text,encoding="utf-8")
          PY

      - name: Validate delivery workflow
        shell: bash
        run: |
          set -euo pipefail

          test -f delivery.html
          test -f config.js
          test -f release-check.html
          test -f system-check.html
          test -f migration.html

          grep -q 'EYE-19-DELIVERY-WORKFLOW-20260723' config.js
          grep -q 'EYE-19-DELIVERY-WORKFLOW-20260723' release-check.html
          grep -q 'EYE-19-DELIVERY-WORKFLOW-20260723' system-check.html
          grep -q 'delivery: `${pageBase}delivery.html`' config.js

          grep -q 'id="deliveryWorkflow"' delivery.html
          grep -q '店舗オーナーへ技術作業を依頼せず' delivery.html
          grep -q 'function runAutoChecks' delivery.html
          grep -q 'admin_release_check' delivery.html
          grep -q 'admin_migrations' delivery.html
          grep -q '進行状況をJSON保存' delivery.html
          grep -q 'A4縦1枚' delivery.html

          grep -q 'key:"delivery"' release-check.html
          grep -q 'key:"delivery_flow"' release-check.html
          grep -q 'id="deliveryLink"' release-check.html
          grep -q 'key:"delivery"' system-check.html
          grep -q 'key:"delivery_flow"' system-check.html
          grep -q 'id="deliveryLink"' migration.html

          ! grep -q 'MutationObserver' delivery.html
          ! grep -q 'owner-brushup.js' delivery.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          pages = [
              "delivery.html",
              "release-check.html",
              "system-check.html",
              "migration.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-step10-inline.js"
                  js_path.write_text(
                      "\n".join(inline),
                      encoding="utf-8",
                  )
                  subprocess.run(
                      ["node","--check",str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node","--check","config.js"],check=True)
          print("config.js check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-10-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-10-delivery-workflow.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-10"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-10 add delivery workflow"
          git push origin HEAD:main
