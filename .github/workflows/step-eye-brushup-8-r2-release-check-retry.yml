name: STEP EYE-BRUSHUP-8 R2 Release Check Retry

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-8-r2-release-check-retry.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-8-r2-release-check-retry
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Apply release check retry fix
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          release_path = Path("release-check.html")
          system_path = Path("system-check.html")
          config_path = Path("config.js")

          for path in [release_path,system_path,config_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          release_path.write_bytes(
              base64.b64decode("")
          )

          system_text = system_path.read_text(encoding="utf-8")
          system_text = system_text.replace(
              "EYE-18-INTEGRATED-RELEASE-CHECK-20260723",
              "EYE-18-R2-RELEASE-CHECK-RETRY-20260723"
          )
          if "EYE-18-R2-RELEASE-CHECK-RETRY-20260723" not in system_text:
              raise SystemExit("system-check.htmlのR2バージョン更新に失敗しました。")
          system_path.write_text(system_text,encoding="utf-8")

          config_text = config_path.read_text(encoding="utf-8")
          config_text, count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-18-R2-RELEASE-CHECK-RETRY-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのR2バージョン更新に失敗しました。")
          config_path.write_text(config_text,encoding="utf-8")
          PY

      - name: Validate R2 release check
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'EYE-18-R2-RELEASE-CHECK-RETRY-20260723' config.js
          grep -q 'EYE-18-R2-RELEASE-CHECK-RETRY-20260723' system-check.html
          grep -q 'EYE-18-R2-RELEASE-CHECK-RETRY-20260723' release-check.html
          grep -q 'requestWithRetry' release-check.html
          grep -q 'endpointRow' release-check.html
          grep -q 'resetRunDisplay' release-check.html
          grep -q 'safeStringify' release-check.html
          grep -q 'release_endpoint' release-check.html
          grep -q 'system_endpoint' release-check.html
          grep -q '営業開始不可' release-check.html

          ! grep -q 'MutationObserver' release-check.html
          ! grep -q 'owner-brushup.js' release-check.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          for page in ["system-check.html","release-check.html"]:
              text = Path(page).read_text(encoding="utf-8")
              parser = HTMLParser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              js_path = Path("/tmp") / f"{Path(page).stem}-r2-inline.js"
              js_path.write_text("\n".join(inline),encoding="utf-8")
              subprocess.run(
                  ["node","--check",str(js_path)],
                  check=True,
              )
              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node","--check","config.js"],check=True)
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-8-r2-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-8-r2-release-check-retry.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-8 R2"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-8 R2 stabilize release check"
          git push origin HEAD:main
