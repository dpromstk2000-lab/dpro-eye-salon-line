      - name: Validate customer repeat booking
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f member.html
          test -f config.js

          grep -q 'id="returningPanel"' index.html
          grep -q 'id="existingBookingWarning"' index.html
          grep -q 'member_reservations' index.html
          grep -q 'exactExistingReservation' index.html
          grep -q 'id="memberShortcutPanel"' member.html
          grep -q '同じ内容で予約' member.html
          grep -q 'キャンセルを申請' member.html
          grep -q 'EYE-16-CUSTOMER-REPEAT-BOOKING-20260722' config.js

          ! grep -q 'MutationObserver' index.html
          ! grep -q 'MutationObserver' member.html
          ! grep -q 'owner-brushup.js' config.js

          python3 <<'PY'
          from pathlib import Path
          import re

          for filename in ("index.html","member.html"):
              html = Path(filename).read_text(encoding="utf-8")
              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  html,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if not inline:
                  raise SystemExit(
                      f"{filename}: 検査対象のインラインJavaScriptがありません。"
                  )
              Path(f"/tmp/{filename}.js").write_text(
                  "\n".join(inline),
                  encoding="utf-8",
              )
          PY

          node --check /tmp/index.html.js
          node --check /tmp/member.html.js
          node --check config.js

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for filename in ("index.html","member.html"):
              parser = Parser()
              parser.feed(Path(filename).read_text(encoding="utf-8"))
              parser.close()
          print("HTML parser checks passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-6-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-6-customer-repeat-booking.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-6"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-6 improve customer repeat booking"
          git push origin HEAD:main
