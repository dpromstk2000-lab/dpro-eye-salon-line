name: STEP EYE-BRUSHUP-13 R2 Fix Starter Config Anchor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-13-r2-fix-starter-config-anchor.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-13-r2-fix-starter-config-anchor
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Lock DPRO NEXT standard
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import json
          import re

          standard_html_path = Path("dpro-next-standard.html")
          standard_json_path = Path("dpro-next-standard.json")
          config_path = Path("config.js")
          delivery_path = Path("delivery.html")
          production_path = Path("production-clone.html")
          starter_path = Path("production-starter.html")
          release_path = Path("release-check.html")
          system_path = Path("system-check.html")

          for path in [
              config_path,delivery_path,production_path,starter_path,
              release_path,system_path
          ]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          standard_html_path.write_bytes(base64.b64decode(''))
          standard_json_path.write_bytes(base64.b64decode(''))

          config_text = config_path.read_text(encoding="utf-8")
          delivery_text = delivery_path.read_text(encoding="utf-8")
          production_text = production_path.read_text(encoding="utf-8")
          starter_text = starter_path.read_text(encoding="utf-8")
          release_text = release_path.read_text(encoding="utf-8")
          system_text = system_path.read_text(encoding="utf-8")

          config_text,count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのVERSION更新に失敗しました。")

          page_anchor = '      production_starter: `${pageBase}production-starter.html`,\n'
          page_insert = (
              '      production_starter: `${pageBase}production-starter.html`,\n'
              '      next_standard: `${pageBase}dpro-next-standard.html`,\n'
          )
          if 'next_standard: `${pageBase}dpro-next-standard.html`' not in config_text:
              if config_text.count(page_anchor) != 1:
                  raise SystemExit("config.jsのnext_standard追加位置が見つかりません。")
              config_text = config_text.replace(page_anchor,page_insert,1)

          for old in [
              "EYE-21-PRODUCTION-STARTER-PACK-20260723",
          ]:
              delivery_text = delivery_text.replace(old,"EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723")
              production_text = production_text.replace(old,"EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723")
              starter_text = starter_text.replace(old,"EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723")
              release_text = release_text.replace(old,"EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723")
              system_text = system_text.replace(old,"EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723")

          delivery_top_anchor = '          <a href="./production-starter.html">導入スターターパック</a>\n'
          delivery_top_insert = (
              '          <a href="./production-starter.html">導入スターターパック</a>\n'
              '          <a href="./dpro-next-standard.html">DPRO NEXT標準</a>\n'
          )
          if 'href="./dpro-next-standard.html">DPRO NEXT標準</a>' not in delivery_text:
              if delivery_text.count(delivery_top_anchor) != 1:
                  raise SystemExit("delivery.html上部リンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_top_anchor,
                  delivery_top_insert,
                  1,
              )

          delivery_quick_anchor = '        <a class="quick-link" href="./production-starter.html"><strong>導入スターターパック</strong><span>本番用10ファイルをZIP生成</span></a>\n'
          delivery_quick_insert = (
              '        <a class="quick-link" href="./production-starter.html"><strong>導入スターターパック</strong><span>本番用10ファイルをZIP生成</span></a>\n'
              '        <a class="quick-link" href="./dpro-next-standard.html"><strong>DPRO NEXT標準</strong><span>美容・予約型の必須仕様を確認</span></a>\n'
          )
          if '<strong>DPRO NEXT標準</strong>' not in delivery_text:
              if delivery_text.count(delivery_quick_anchor) != 1:
                  raise SystemExit("delivery.htmlクイックリンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_quick_anchor,
                  delivery_quick_insert,
                  1,
              )
              delivery_text = delivery_text.replace(
                  '.quick-links{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:9px}',
                  '.quick-links{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:9px}',
                  1,
              )

          delivery_task_anchor = '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          delivery_task_insert = (
              '            {id:"next_standard_lock",role:"assistant",title:"DPRO NEXT美容・予約型標準として固定",detail:"必須機能、禁止事項、オーナー作業境界、変更管理を標準JSONと内部画面へ固定します。"},\n'
              '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          )
          if 'id:"next_standard_lock"' not in delivery_text:
              if delivery_text.count(delivery_task_anchor) != 1:
                  raise SystemExit("delivery.htmlのNEXT標準タスク追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_task_anchor,
                  delivery_task_insert,
                  1,
              )

          production_link_anchor = '<a href="./production-starter.html">導入スターターパック</a><a href="./release-check.html">内部最終検査</a>'
          production_link_insert = (
              '<a href="./production-starter.html">導入スターターパック</a>'
              '<a href="./dpro-next-standard.html">DPRO NEXT標準</a>'
              '<a href="./release-check.html">内部最終検査</a>'
          )
          if 'href="./dpro-next-standard.html">DPRO NEXT標準</a>' not in production_text:
              if production_text.count(production_link_anchor) != 1:
                  raise SystemExit("production-clone.htmlのNEXT標準リンク追加位置が見つかりません。")
              production_text = production_text.replace(
                  production_link_anchor,
                  production_link_insert,
                  1,
              )

          production_gate_anchor = '["postcheck","assistant","本番初回予約・通知・カルテを確認","問題なければ納品完了。"]'
          production_gate_insert = (
              '["next_standard","assistant","DPRO NEXT美容・予約型標準を確認",'
              '"必須部品・禁止事項・作業境界・変更管理が固定されていることを確認。"],\n'
              '["postcheck","assistant","本番初回予約・通知・カルテを確認","問題なければ納品完了。"]'
          )
          if '["next_standard","assistant"' not in production_text:
              if production_text.count(production_gate_anchor) != 1:
                  raise SystemExit("production-clone.htmlのNEXT標準ゲート追加位置が見つかりません。")
              production_text = production_text.replace(
                  production_gate_anchor,
                  production_gate_insert,
                  1,
              )

          starter_link_anchor = '<a href="./production-clone.html">本番店舗複製</a><a href="./delivery.html">導入・納品進行</a><a href="./release-check.html">内部最終検査</a>'
          starter_link_insert = (
              '<a href="./production-clone.html">本番店舗複製</a>'
              '<a href="./delivery.html">導入・納品進行</a>'
              '<a href="./dpro-next-standard.html">DPRO NEXT標準</a>'
              '<a href="./release-check.html">内部最終検査</a>'
          )
          if 'href="./dpro-next-standard.html">DPRO NEXT標準</a>' not in starter_text:
              if starter_text.count(starter_link_anchor) != 1:
                  raise SystemExit("production-starter.htmlのNEXT標準リンク追加位置が見つかりません。")
              starter_text = starter_text.replace(
                  starter_link_anchor,
                  starter_link_insert,
                  1,
              )

          starter_pages_anchor = 'production_starter:`${base}production-starter.html`,system_check:'
          starter_pages_insert = (
              'production_starter:`${base}production-starter.html`,'
              'next_standard:`${base}dpro-next-standard.html`,system_check:'
          )
          if 'next_standard:`${base}dpro-next-standard.html`' not in starter_text:
              if starter_text.count(starter_pages_anchor) != 1:
                  raise SystemExit("production-starter.htmlの本番URL一覧追加位置が見つかりません。")
              starter_text = starter_text.replace(
                  starter_pages_anchor,
                  starter_pages_insert,
                  1,
              )

          starter_config_anchor = (
              r'production_starter:\`\${pageBase}production-starter.html\`'
          )
          starter_config_insert = (
              r'production_starter:\`\${pageBase}production-starter.html\`,' +
              "\n" +
              r'next_standard:\`\${pageBase}dpro-next-standard.html\`'
          )
          starter_config_marker = (
              r'next_standard:\`\${pageBase}dpro-next-standard.html\`'
          )
          if starter_config_marker not in starter_text:
              anchor_count = starter_text.count(starter_config_anchor)
              if anchor_count != 1:
                  raise SystemExit(
                      "production-starter.html生成config.jsの追加位置が見つかりません。"
                      f" anchor_count={anchor_count}"
                  )
              starter_text = starter_text.replace(
                  starter_config_anchor,
                  starter_config_insert,
                  1,
              )

          for label,current in [("release",release_text),("system",system_text)]:
              page_rule_anchor = '        {\n          key:"production_starter",'
              if 'key:"next_standard"' not in current:
                  if current.count(page_rule_anchor) != 1:
                      raise SystemExit(f"{label}のPAGE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      page_rule_anchor,
                      '        {\n          key:"next_standard",name:"DPRO NEXT 美容・予約型標準",url:config.PAGES.next_standard,\n          markers:[\n            configScript(),attr("id","standardLock"),\n            "DPRO-NEXT-BEAUTY-RESERVATION-1",\n            "NEXT・標準固定済み",\n            "function promptText",\n          ],\n        },\n' + page_rule_anchor,
                      1,
                  )

              feature_anchor = '        {\n          key:"production_starter_pack"'
              if 'key:"dpro_next_standard_lock"' not in current:
                  if current.count(feature_anchor) != 1:
                      raise SystemExit(f"{label}のFEATURE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      feature_anchor,
                      '        {\n          key:"dpro_next_standard_lock",label:"DPRO NEXT美容・予約型標準の固定",\n          requirements:[\n            ["next_standard",attr("id","standardLock")],\n            ["next_standard","DPRO-NEXT-BEAUTY-RESERVATION-1"],\n            ["next_standard","NEXT・標準固定済み"],\n            ["next_standard",fn("promptText")],\n          ],\n        },\n' + feature_anchor,
                      1,
                  )

              if label == "release":
                  release_text = current
              else:
                  system_text = current

          release_link_anchor = '          <a id="productionStarterLink" href="./production-starter.html">導入スターターパック</a>\n'
          release_link_insert = (
              '          <a id="productionStarterLink" href="./production-starter.html">導入スターターパック</a>\n'
              '          <a id="nextStandardLink" href="./dpro-next-standard.html">DPRO NEXT標準</a>\n'
          )
          if 'id="nextStandardLink"' not in release_text:
              if release_text.count(release_link_anchor) != 1:
                  raise SystemExit("release-check.htmlのNEXT標準リンク追加位置が見つかりません。")
              release_text = release_text.replace(
                  release_link_anchor,
                  release_link_insert,
                  1,
              )

          config_path.write_text(config_text,encoding="utf-8")
          delivery_path.write_text(delivery_text,encoding="utf-8")
          production_path.write_text(production_text,encoding="utf-8")
          starter_path.write_text(starter_text,encoding="utf-8")
          release_path.write_text(release_text,encoding="utf-8")
          system_path.write_text(system_text,encoding="utf-8")
          PY

      - name: Validate DPRO NEXT standard
        shell: bash
        run: |
          set -euo pipefail

          test -f dpro-next-standard.html
          test -f dpro-next-standard.json
          test -f config.js
          test -f delivery.html
          test -f production-clone.html
          test -f production-starter.html
          test -f release-check.html
          test -f system-check.html

          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' config.js
          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' delivery.html
          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' production-clone.html
          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' production-starter.html
          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' release-check.html
          grep -q 'EYE-22-DPRO-NEXT-STANDARD-LOCK-20260723' system-check.html

          grep -q 'next_standard: `${pageBase}dpro-next-standard.html`' config.js

          grep -q 'id="standardLock"' dpro-next-standard.html
          grep -q 'DPRO-NEXT-BEAUTY-RESERVATION-1' dpro-next-standard.html
          grep -q 'NEXT・標準固定済み' dpro-next-standard.html
          grep -q 'function promptText' dpro-next-standard.html

          grep -q '"standard_id": "DPRO-NEXT-BEAUTY-RESERVATION-1"' dpro-next-standard.json
          grep -q '"status": "NEXT"' dpro-next-standard.json
          grep -q '"locked": true' dpro-next-standard.json
          grep -q '"minimum_public_pages": 12' dpro-next-standard.json

          grep -q 'id:"next_standard_lock"' delivery.html
          grep -q 'href="./dpro-next-standard.html"' delivery.html
          grep -q '\["next_standard","assistant"' production-clone.html
          grep -q 'href="./dpro-next-standard.html"' production-clone.html
          grep -q 'next_standard:`${base}dpro-next-standard.html`' production-starter.html
          grep -Fq 'next_standard:\`\${pageBase}dpro-next-standard.html\`' production-starter.html

          grep -q 'key:"next_standard"' release-check.html
          grep -q 'key:"dpro_next_standard_lock"' release-check.html
          grep -q 'id="nextStandardLink"' release-check.html
          grep -q 'key:"next_standard"' system-check.html
          grep -q 'key:"dpro_next_standard_lock"' system-check.html

          ! grep -q 'MutationObserver' dpro-next-standard.html
          ! grep -q 'owner-brushup.js' dpro-next-standard.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import json
          import re
          import subprocess

          standard = json.loads(
              Path("dpro-next-standard.json").read_text(encoding="utf-8")
          )

          if standard.get("standard_id") != "DPRO-NEXT-BEAUTY-RESERVATION-1":
              raise SystemExit("標準IDが不正です。")
          if standard.get("status") != "NEXT" or standard.get("locked") is not True:
              raise SystemExit("NEXT固定状態が不正です。")
          if len(standard.get("mandatory_components",[])) != 12:
              raise SystemExit("必須部品数が12件ではありません。")
          if standard.get("acceptance",{}).get("minimum_public_pages") != 12:
              raise SystemExit("最低公開検査画面数が12ではありません。")

          pages = [
              "dpro-next-standard.html",
              "delivery.html",
              "production-clone.html",
              "production-starter.html",
              "release-check.html",
              "system-check.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-step13-inline.js"
                  js_path.write_text(
                      "\n".join(inline),
                      encoding="utf-8",
                  )
                  subprocess.run(
                      ["node","--check",str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node","--check","config.js"],check=True)
          print("config.js check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-13-r2-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-13-dpro-next-standard-lock.yml"
          rm -f ".github/workflows/step-eye-brushup-13-r2-fix-starter-config-anchor.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-13 R2"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-13 R2 lock DPRO NEXT standard"
          git push origin HEAD:main
