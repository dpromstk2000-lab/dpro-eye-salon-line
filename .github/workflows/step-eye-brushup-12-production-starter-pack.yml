name: STEP EYE-BRUSHUP-12 Production Starter Pack

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-12-production-starter-pack.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-12-production-starter-pack
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Add production starter pack
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          starter_path = Path("production-starter.html")
          config_path = Path("config.js")
          production_path = Path("production-clone.html")
          delivery_path = Path("delivery.html")
          release_path = Path("release-check.html")
          system_path = Path("system-check.html")

          for path in [config_path,production_path,delivery_path,release_path,system_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          starter_path.write_bytes(base64.b64decode(''))

          config_text = config_path.read_text(encoding="utf-8")
          production_text = production_path.read_text(encoding="utf-8")
          delivery_text = delivery_path.read_text(encoding="utf-8")
          release_text = release_path.read_text(encoding="utf-8")
          system_text = system_path.read_text(encoding="utf-8")

          config_text,count = re.subn(
              r'VERSION:\s*"[^"]+"',
              'VERSION: "EYE-21-PRODUCTION-STARTER-PACK-20260723"',
              config_text,
              count=1,
          )
          if count != 1:
              raise SystemExit("config.jsのVERSION更新に失敗しました。")

          page_anchor = '      production_clone: `${pageBase}production-clone.html`,\n'
          page_insert = (
              '      production_clone: `${pageBase}production-clone.html`,\n'
              '      production_starter: `${pageBase}production-starter.html`,\n'
          )
          if 'production_starter: `${pageBase}production-starter.html`' not in config_text:
              if config_text.count(page_anchor) != 1:
                  raise SystemExit("config.jsのproduction_starter追加位置が見つかりません。")
              config_text = config_text.replace(page_anchor,page_insert,1)

          production_text = production_text.replace(
              "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723",
              "EYE-21-PRODUCTION-STARTER-PACK-20260723"
          )

          production_link_anchor = '<a href="./release-check.html">内部最終検査</a>'
          production_link_insert = (
              '<a href="./production-starter.html">導入スターターパック</a>'
              '<a href="./release-check.html">内部最終検査</a>'
          )
          if 'href="./production-starter.html"' not in production_text:
              if production_text.count(production_link_anchor) != 1:
                  raise SystemExit("production-clone.htmlのリンク追加位置が見つかりません。")
              production_text = production_text.replace(
                  production_link_anchor,
                  production_link_insert,
                  1,
              )

          starter_gate_anchor = '["postcheck","assistant","本番初回予約・通知・カルテを確認","問題なければ納品完了。"]'
          starter_gate_insert = (
              '["starter_pack","assistant","本番店舗導入スターターパックを生成",'
              '"config.js・Worker・Supabase・LINE・URL・切替・ロールバック・納品記録をZIP化。"],\n'
              '["postcheck","assistant","本番初回予約・通知・カルテを確認","問題なければ納品完了。"]'
          )
          if '["starter_pack","assistant"' not in production_text:
              if production_text.count(starter_gate_anchor) != 1:
                  raise SystemExit("production-clone.htmlのスターターパックゲート追加位置が見つかりません。")
              production_text = production_text.replace(
                  starter_gate_anchor,
                  starter_gate_insert,
                  1,
              )

          delivery_text = delivery_text.replace(
              "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723",
              "EYE-21-PRODUCTION-STARTER-PACK-20260723"
          )

          delivery_top_anchor = '          <a href="./production-clone.html">本番店舗複製</a>\n'
          delivery_top_insert = (
              '          <a href="./production-clone.html">本番店舗複製</a>\n'
              '          <a href="./production-starter.html">導入スターターパック</a>\n'
          )
          if 'href="./production-starter.html">導入スターターパック</a>' not in delivery_text:
              if delivery_text.count(delivery_top_anchor) != 1:
                  raise SystemExit("delivery.html上部リンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_top_anchor,
                  delivery_top_insert,
                  1,
              )

          delivery_quick_anchor = '        <a class="quick-link" href="./production-clone.html"><strong>本番店舗複製</strong><span>別環境・Secrets・切替ゲート</span></a>\n'
          delivery_quick_insert = (
              '        <a class="quick-link" href="./production-clone.html"><strong>本番店舗複製</strong><span>別環境・Secrets・切替ゲート</span></a>\n'
              '        <a class="quick-link" href="./production-starter.html"><strong>導入スターターパック</strong><span>本番用10ファイルをZIP生成</span></a>\n'
          )
          if '<strong>導入スターターパック</strong>' not in delivery_text:
              if delivery_text.count(delivery_quick_anchor) != 1:
                  raise SystemExit("delivery.htmlクイックリンクの追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_quick_anchor,
                  delivery_quick_insert,
                  1,
              )
              delivery_text = delivery_text.replace(
                  '.quick-links{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:9px}',
                  '.quick-links{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:9px}',
                  1,
              )

          delivery_task_anchor = '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          delivery_task_insert = (
              '            {id:"starter_pack",role:"assistant",title:"本番店舗導入スターターパックを生成",detail:"本番用config.js、Worker・Supabase・LINE設定、URL、切替、ロールバック、納品記録を安全なZIPにまとめます。"},\n'
              '            {id:"cutover",role:"iwaguchi",title:"本番切替・公開URL・LINE導線を確定",detail:"切替時間を決め、旧予約受付の停止と新予約開始を合わせます。"},\n'
          )
          if 'id:"starter_pack"' not in delivery_text:
              if delivery_text.count(delivery_task_anchor) != 1:
                  raise SystemExit("delivery.htmlのスターターパックタスク追加位置が見つかりません。")
              delivery_text = delivery_text.replace(
                  delivery_task_anchor,
                  delivery_task_insert,
                  1,
              )

          for label,current in [("release",release_text),("system",system_text)]:
              current = current.replace(
                  "EYE-20-PRODUCTION-CLONE-TEMPLATE-20260723",
                  "EYE-21-PRODUCTION-STARTER-PACK-20260723"
              )

              page_rule_anchor = '        {\n          key:"production_clone",'
              if 'key:"production_starter"' not in current:
                  if current.count(page_rule_anchor) != 1:
                      raise SystemExit(f"{label}のPAGE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      page_rule_anchor,
                      '        {\n          key:"production_starter",name:"本番店舗導入スターターパック",url:config.PAGES.production_starter,\n          markers:[\n            configScript(),attr("id","decisionBox"),\n            "本番導入スターターパックZIP",\n            "function zipBlob",\n            "CLOUDFLARE-SECRETS-CHECKLIST.txt",\n          ],\n        },\n' + page_rule_anchor,
                      1,
                  )

              feature_anchor = '        {\n          key:"production_clone_guard"'
              if 'key:"production_starter_pack"' not in current:
                  if current.count(feature_anchor) != 1:
                      raise SystemExit(f"{label}のFEATURE_RULES追加位置が見つかりません。")
                  current = current.replace(
                      feature_anchor,
                      '        {\n          key:"production_starter_pack",label:"本番導入ファイル10点・秘密情報非保存",\n          requirements:[\n            ["production_starter",attr("id","decisionBox")],\n            ["production_starter","本番導入スターターパックZIP"],\n            ["production_starter",fn("zipBlob")],\n            ["production_starter","SET_AS_CLOUDFLARE_SECRET_NOT_STORED"],\n          ],\n        },\n' + feature_anchor,
                      1,
                  )

              if label == "release":
                  release_text = current
              else:
                  system_text = current

          release_link_anchor = '          <a id="productionCloneLink" href="./production-clone.html">本番店舗複製</a>\n'
          release_link_insert = (
              '          <a id="productionCloneLink" href="./production-clone.html">本番店舗複製</a>\n'
              '          <a id="productionStarterLink" href="./production-starter.html">導入スターターパック</a>\n'
          )
          if 'id="productionStarterLink"' not in release_text:
              if release_text.count(release_link_anchor) != 1:
                  raise SystemExit("release-check.htmlのスターターパックリンク追加位置が見つかりません。")
              release_text = release_text.replace(
                  release_link_anchor,
                  release_link_insert,
                  1,
              )

          config_path.write_text(config_text,encoding="utf-8")
          production_path.write_text(production_text,encoding="utf-8")
          delivery_path.write_text(delivery_text,encoding="utf-8")
          release_path.write_text(release_text,encoding="utf-8")
          system_path.write_text(system_text,encoding="utf-8")
          PY

      - name: Validate production starter pack
        shell: bash
        run: |
          set -euo pipefail

          test -f production-starter.html
          test -f production-clone.html
          test -f delivery.html
          test -f config.js
          test -f release-check.html
          test -f system-check.html

          grep -q 'EYE-21-PRODUCTION-STARTER-PACK-20260723' config.js
          grep -q 'EYE-21-PRODUCTION-STARTER-PACK-20260723' production-clone.html
          grep -q 'EYE-21-PRODUCTION-STARTER-PACK-20260723' delivery.html
          grep -q 'EYE-21-PRODUCTION-STARTER-PACK-20260723' release-check.html
          grep -q 'EYE-21-PRODUCTION-STARTER-PACK-20260723' system-check.html

          grep -q 'production_starter: `${pageBase}production-starter.html`' config.js

          grep -q '本番店舗導入スターターパック' production-starter.html
          grep -q 'id="decisionBox"' production-starter.html
          grep -q '本番導入スターターパックZIP' production-starter.html
          grep -q 'function zipBlob' production-starter.html
          grep -q 'CLOUDFLARE-SECRETS-CHECKLIST.txt' production-starter.html
          grep -q 'SUPABASE-SETUP-CHECKLIST.txt' production-starter.html
          grep -q 'LINE-LIFF-SETUP.txt' production-starter.html
          grep -q 'ROLLBACK.txt' production-starter.html
          grep -q 'DELIVERY-RECORD.json' production-starter.html
          grep -q 'SET_AS_CLOUDFLARE_SECRET_NOT_STORED' production-starter.html

          grep -q 'href="./production-starter.html"' production-clone.html
          grep -q '\["starter_pack","assistant"' production-clone.html
          grep -q 'id:"starter_pack"' delivery.html
          grep -q 'href="./production-starter.html"' delivery.html

          grep -q 'key:"production_starter"' release-check.html
          grep -q 'key:"production_starter_pack"' release-check.html
          grep -q 'id="productionStarterLink"' release-check.html
          grep -q 'key:"production_starter"' system-check.html
          grep -q 'key:"production_starter_pack"' system-check.html

          ! grep -q 'MutationObserver' production-starter.html
          ! grep -q 'owner-brushup.js' production-starter.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          pages = [
              "production-starter.html",
              "production-clone.html",
              "delivery.html",
              "release-check.html",
              "system-check.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-step12-inline.js"
                  js_path.write_text(
                      "\n".join(inline),
                      encoding="utf-8",
                  )
                  subprocess.run(
                      ["node","--check",str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML / JavaScript check passed.")

          subprocess.run(["node","--check","config.js"],check=True)
          print("config.js check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-12-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-12-production-starter-pack.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-12"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-12 add production starter pack"
          git push origin HEAD:main
